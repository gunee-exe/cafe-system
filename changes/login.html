<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — CafeDB</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background: #f5ebe0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    border: none;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.12);
  }
  .login-header {
    background: #5c3d2e;
    color: white;
    border-radius: 16px 16px 0 0;
    padding: 2rem;
    text-align: center;
  }
  .login-header h2 { color: #d4a853; margin: 0; font-weight: 700; }
  .login-header p  { color: rgba(255,255,255,.7); margin: 0; font-size: .9rem; }
  .btn-cafe { background: #5c3d2e; color: white; }
  .btn-cafe:hover { background: #3e2a1e; color: white; }
</style>
</head>
<body>

<div class="card login-card">
  <div class="login-header">
    <div style="font-size:2.5rem">☕</div>
    <h2>CafeDB</h2>
    <p>Staff Login</p>
  </div>
  <div class="card-body p-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Employee Name</label>
        <input type="text" name="emp_name" class="form-control"
               placeholder="Enter your name" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-cafe w-100 py-2 fw-semibold">
        Sign In
      </button>
    </form>

    <div class="mt-3 text-center text-muted" style="font-size:.8rem">
      <strong>Default passwords:</strong><br>
      Manager: manager123 &nbsp;|&nbsp; Cashier: cashier123 &nbsp;|&nbsp; Barista: barista123
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
