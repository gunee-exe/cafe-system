{% extends 'base.html' %}
{% block title %}Add Promo Code{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto;">
  <div class="card-header"><h2>🏷️ Add Promo Code</h2></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Code</label>
        <input class="form-control" name="code" required placeholder="e.g. SUMMER20"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Discount Type</label>
          <select class="form-control" name="discount_type">
            <option value="percent">Percent (%)</option>
            <option value="fixed">Fixed Amount (Rs.)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Discount Amount</label>
          <input class="form-control" name="discount_amount" type="number" step="0.01" min="1" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Expiry Date</label>
          <input class="form-control" name="expiry_date" type="date" required/>
        </div>
        <div class="form-group">
          <label>Minimum Order Value (Rs.)</label>
          <input class="form-control" name="min_order_val" type="number" step="0.01" min="0" value="0" required/>
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">Add Promo Code</button>
        <a href="/promos" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
