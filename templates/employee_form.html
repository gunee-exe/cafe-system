{% extends 'base.html' %}
{% block title %}{{ action }} Employee{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto;">
  <div class="card-header">
    <h3>{{ action }} Employee</h3>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" name="emp_name" required value="{{ employee.emp_name if employee else '' }}" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date of Birth</label>
          <input class="form-control" name="dob" type="date" required value="{{ employee.dob if employee else '' }}" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select class="form-control" name="role">
            {% for r in ['Barista','Cashier','Manager'] %}
            <option value="{{ r }}" {{ 'selected' if employee and employee.role==r else '' }}>{{ r }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Salary (Rs.)</label>
        <input class="form-control" name="salary" type="number" min="1" required
          value="{{ employee.salary if employee else '' }}" />
      </div>
      <div class="form-group">
        <label>
          Password
          {% if action=='Edit' %}
          <span style="font-weight:400;color:var(--muted);font-size:.82rem;"> — leave blank to keep current</span>
          {% endif %}
        </label>
        <input class="form-control" name="password" type="password" {{ 'required' if action=='Add' else '' }}
          placeholder="{{ 'Set a login password' if action=='Add' else 'Enter new password to change it' }}" />
      </div>
      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{{ action }} Employee</button>
        <a href="/employees" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
