{% extends 'base.html' %}
{% block title %}{{ action }} Menu Item{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto;">
  <div class="card-header"><h2>{{ action }} Menu Item</h2></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Item Name</label>
        <input class="form-control" name="item_name" required value="{{ item.item_name if item else '' }}"/>
      </div>
      <div class="form-group">
        <label>Price (Rs.)</label>
        <input class="form-control" name="price" type="number" step="0.01" min="1" required value="{{ item.price if item else '' }}"/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select class="form-control" name="category">
          {% for cat in ['Hot Drink','Cold Drink','Food Item'] %}
          <option value="{{ cat }}" {{ 'selected' if item and item.category==cat else '' }}>{{ cat }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group flex gap-2" style="align-items:center;">
        <input type="checkbox" name="is_available" id="avail" {{ 'checked' if not item or item.is_available else '' }}/>
        <label for="avail" style="margin:0;">Available for order</label>
      </div>
      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">{{ action }} Item</button>
        <a href="/menu" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
