<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — CafeManager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#6f4e37;--primary-dark:#4a3423;--accent:#e8c07d;
  --bg:#fdf8f3;--card:#fff;--border:#e0d0c0;--text:#2d1f13;--muted:#7a6252;
  --success:#2e7d32;--danger:#c62828;--warning:#e65100;--info:#01579b;
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
body{
  font-family:'Segoe UI',sans-serif;background:var(--bg);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(111,78,55,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(232,192,125,.10) 0%, transparent 50%);
}
.login-wrap{
  width:100%;max-width:420px;padding:2rem;
  animation:fadeInUp .5s ease-out both;
}
.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{font-size:3rem;display:block;margin-bottom:.5rem;}
.logo h1{font-size:1.8rem;font-weight:700;color:var(--primary-dark);}
.logo h1 span{color:var(--accent);}
.logo p{color:var(--muted);font-size:.9rem;margin-top:.25rem;}
.card{
  background:var(--card);border-radius:16px;
  box-shadow:0 4px 24px rgba(111,78,55,.12);
  border:1px solid var(--border);overflow:hidden;
}
.card-header{
  padding:1.25rem 1.75rem;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
}
.card-header h2{font-size:1.05rem;font-weight:600;}
.card-header p{font-size:.82rem;opacity:.8;margin-top:.2rem;}
.card-body{padding:1.75rem;}
.alert{
  padding:.85rem 1rem;border-radius:8px;margin-bottom:1.25rem;
  font-size:.9rem;animation:slideDown .3s ease-out;
}
.alert-success{background:#e8f5e9;border-left:4px solid var(--success);color:var(--success);}
.alert-danger {background:#ffebee;border-left:4px solid var(--danger);color:var(--danger);}
.alert-warning{background:#fff3e0;border-left:4px solid var(--warning);color:var(--warning);}
.alert-info   {background:#e3f2fd;border-left:4px solid var(--info);color:var(--info);}
.form-group{margin-bottom:1.1rem;}
.form-group label{
  display:block;margin-bottom:.45rem;
  font-weight:600;font-size:.88rem;color:var(--text);
}
.form-group input{
  width:100%;padding:.8rem 1rem;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:.95rem;color:var(--text);background:#fff;
  font-family:inherit;transition:border-color .2s,box-shadow .2s;
}
.form-group input:focus{
  outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(111,78,55,.12);
}
.btn-login{
  width:100%;padding:.9rem;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;border:none;border-radius:8px;
  font-size:1rem;font-weight:600;cursor:pointer;
  font-family:inherit;margin-top:.5rem;
  transition:all .25s ease;
}
.btn-login:hover{box-shadow:0 4px 16px rgba(111,78,55,.35);}
.btn-login:active{transform:scale(.98);}
.hint{
  text-align:center;margin-top:1.25rem;
  font-size:.82rem;color:var(--muted);
  padding:.75rem;background:#fdf8f3;border-radius:8px;
  border:1px solid var(--border);
}
.hint strong{color:var(--primary-dark);}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <span class="logo-icon">☕</span>
    <h1>Cafe<span>Manager</span></h1>
    <p>Employee Login Portal</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <div class="card-header">
      <h2>Sign In</h2>
      <p>Enter your name and password to continue</p>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label>Employee Name</label>
          <input type="text" name="emp_name" placeholder="e.g. Junaid Alam" required autofocus/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required/>
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
      </form>
    </div>
  </div>

  <div class="hint">
    <strong>First time?</strong> Ask your Manager to set your password in the Employees section.
  </div>
</div>
</body>
</html>
